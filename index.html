<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Mother's Day</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(180deg, #fff7f0, #f7dfd5);
  overflow-x: hidden;
  color: #7a4a42;
}

/* 卡片 */
.container {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.card {
  width: 100%;
  max-width: 900px;
  background: rgba(255,250,246,0.95);
  border-radius: 30px;
  box-shadow: 0 30px 80px rgba(120,70,60,0.25);
  text-align: center;
  padding: 30px;
  animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

img {
  width: 100%;
  border-radius: 20px;
}

/* 标题 */
h1 {
  color: #c17772;
  margin-top: 20px;
  font-size: 42px;
}

/* 按钮 */
.btn {
  margin-top: 20px;
  padding: 12px 30px;
  background: #c17772;
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 18px;
  cursor: pointer;
}

/* 情书 */
.letter {
  max-height: 0;
  overflow: hidden;
  transition: all 0.8s ease;
  margin-top: 20px;
}

.letter.show {
  max-height: 500px;
}

.letter p {
  font-size: 20px;
  line-height: 1.8;
}

/* 飘花 */
.flower {
  position: fixed;
  pointer-events: none;
  animation: fall 3s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0) scale(1); opacity: 1; }
  100% { transform: translateY(200px) scale(0.5); opacity: 0; }
}

/* 心 */
.heart {
  font-size: 40px;
  cursor: pointer;
  margin-top: 15px;
  display: inline-block;
  transition: transform 0.2s;
}

.heart:hover {
  transform: scale(1.2);
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <img src="mothers-day.png">

    <h1>Happy Mother’s Day</h1>

    <div class="heart" onclick="createFlowers(event)">❤️</div>

    <button class="btn" onclick="toggleLetter()">打开一封信 💌</button>

    <div class="letter" id="letter">
      <p>
        谢谢你一直为这个家付出的一切，<br>
        你的温柔和爱让一切都变得完整。<br><br>

        我们真的很幸运有你 ❤️<br><br>

        母亲节快乐，我爱你。
      </p>
    </div>

  </div>
</div>

<script>
function toggleLetter() {
  const letter = document.getElementById("letter");
  letter.classList.toggle("show");
}

/* 点击产生花瓣 */
function createFlowers(e) {
  for (let i = 0; i < 10; i++) {
    const flower = document.createElement("div");
    flower.className = "flower";
    flower.innerHTML = "🌸";

    flower.style.left = e.clientX + "px";
    flower.style.top = e.clientY + "px";

    document.body.appendChild(flower);

    setTimeout(() => flower.remove(), 3000);
  }
}
</script>

</body>
</html>
