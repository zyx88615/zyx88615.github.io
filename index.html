<!DOCTYPE html>
<html lang="en">
<head>

      color: white;
      padding: 40px;

    footer {
      margin-top: 40px;
      padding: 20px;
      background: #333;
      color: white;
    }
  </style>
</head>

<body>

<header>
  Welcome to My Website
</header>

<div class="container">

  <div class="card">
    <h2>About Me</h2>
    <p>This is my personal website hosted on GitHub Pages.</p>
  </div>

  <div class="card">
    <h2>My Project</h2>
    <p>You can showcase your house design, portfolio, or anything here.</p>
  </div>

</div>

<footer>
  © 2026 My Website
</footer>

</body>
</html>
