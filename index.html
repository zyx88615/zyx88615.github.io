<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Mother's Day</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  background: linear-gradient(180deg, #fff7f0, #f7dfd5);
  color: #7a4a42;
  overflow-x: hidden;
}

/* 背景爱心动画 */
.hearts {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.heart {
  position: absolute;
  bottom: -40px;
  color: rgba(193,119,114,0.35);
  font-size: 20px;
  animation: floatUp 8s linear infinite;
}

.heart:nth-child(1) { left: 10%; animation-delay: 0s; }
.heart:nth-child(2) { left: 30%; animation-delay: 2s; }
.heart:nth-child(3) { left: 50%; animation-delay: 1s; }
.heart:nth-child(4) { left: 70%; animation-delay: 3s; }
.heart:nth-child(5) { left: 85%; animation-delay: 1.5s; }

@keyframes floatUp {
  from { transform: translateY(0); opacity: 0; }
  20% { opacity: 1; }
  to { transform: translateY(-110vh); opacity: 0; }
}

.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px;
}

.card {
  max-width: 980px;
  background: rgba(255,250,246,0.92);
  border-radius: 30px;
  box-shadow: 0 25px 80px rgba(120,70,60,0.25);
  overflow: hidden;
  text-align: center;
}

.image-wrap {
  padding: 18px;
}

.image-wrap img {
  width: 100%;
  border-radius: 20px;
}

.message {
  padding: 35px 28px 45px;
}

h1 {
  font-size: 44px;
  color: #c17772;
  margin-bottom: 15px;
  letter-spacing: 2px;
}

p {
  font-size: 20px;
  line-height: 1.8;
}

.qr-box {
  margin-top: 30px;
}

.qr-box img {
  width: 180px;
  border-radius: 16px;
  padding: 10px;
  background: white;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.footer {
  margin-top: 20px;
  font-size: 18px;
  color: #b76561;
}

@media (max-width: 600px) {
  h1 { font-size: 32px; }
  p { font-size: 17px; }
}
</style>
</head>

<body>

<!-- 爱心动画 -->
<div class="hearts">
  <div class="heart">♥</div>
  <div class="heart">♥</div>
  <div class="heart">♥</div>
  <div class="heart">♥</div>
  <div class="heart">♥</div>
</div>

<section class="hero">
  <div class="card">

    <div class="image-wrap">
      <img src="mothers-day.png" alt="Mother's Day">
    </div>

    <div class="message">
      <h1>Happy Mother’s Day</h1>

      <p>
        给最美的妈妈，也是最好的老婆，<br>
        谢谢你一直为这个家付出的一切。
      </p>

      <p>
        因为有你，我们的生活才完整。<br>
        我们真的很幸运有你 ❤️
      </p>

      <div class="qr-box">
        <p>🎁 扫描领取你的礼物</p>
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://zyx88615.github.io/gift.html">
      </div>

      <div class="footer">
        Love you forever 💖
      </div>
    </div>

  </div>
</section>

</body>
</html>
